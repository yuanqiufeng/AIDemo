server:
  port: 8080

spring:
  main:
    web-application-type: reactive

realtime:
  audio:
    sample-rate: 16000
    frame-ms: 20
    speech-start-rms: 0.008
    speech-end-rms: 0.004
    min-speech-ms: 120
    silence-endpoint-ms: 420
    max-utterance-ms: 600000
    assistant-echo-hold-ms: 350
    barge-in-enabled: true
    interrupt-rms: 0.09
    interrupt-min-speech-ms: 520
    assistant-barge-in-delay-ms: 700
    barge-in-restart-delay-ms: 80
    tts-tail-ignore-ms: 150
  asr:
    mode: http
    base-url: ${ASR_BASE_URL:http://127.0.0.1:11095}
    connect-timeout: 1500ms
    response-timeout: 120000ms
  llm:
    mode: http
    base-url: ${LLM_BASE_URL:http://127.0.0.1:8001}
    model: ${LLM_MODEL:deepseek-v4-pro}
    first-delta-timeout: ${LLM_FIRST_DELTA_TIMEOUT:45s}
    response-timeout: ${LLM_RESPONSE_TIMEOUT:180s}
  tts:
    mode: http
    base-url: ${TTS_BASE_URL:http://127.0.0.1:18002}
    sample-rate: ${TTS_SAMPLE_RATE:24000}
