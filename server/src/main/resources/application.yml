server:
  port: 8080

spring:
  main:
    web-application-type: reactive

realtime:
  audio:
    sample-rate: 16000
    frame-ms: 20
    speech-start-rms: 0.030
    speech-end-rms: 0.014
    min-speech-ms: 260
    silence-endpoint-ms: 700
    interrupt-rms: 0.040
  asr:
    mode: http
    base-url: http://127.0.0.1:10095
    connect-timeout: 1500ms
    response-timeout: 30000ms
  llm:
    mode: http
    base-url: http://127.0.0.1:8001
    model: deepseek-v4-pro
  tts:
    mode: http
    base-url: http://127.0.0.1:8002
    sample-rate: 24000
